services:
  # ── Backend API + WebSocket server ───────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
      # Optional: set ANTHROPIC_API_KEY if you replace the claude CLI
      # with the Anthropic API. The current implementation uses the
      # claude CLI binary — see README for how to mount it.
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      # Persist knowledge base and meeting data between restarts
      - knowledge_data:/app/.knowledge
      - meetings_data:/app/.meetings
      # Mount your claude CLI config for AI coaching (optional).
      # Comment out if you don't need AI analysis.
      - ${HOME}/.claude:/root/.claude:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend Next.js app ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # The browser connects to this URL directly — must be reachable
        # from the user's machine, not just within Docker.
        # Change to ws://<your-server-ip>:3001/ws for remote deployments.
        NEXT_PUBLIC_WS_URL: ws://localhost:3001/ws
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  knowledge_data:
  meetings_data:
