services:
  # ── Backend API + WebSocket server ───────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
      # Ollama embedding (running on host)
      OLLAMA_URL: "http://host.docker.internal:11434"
      EMBED_MODEL: "nomic-embed-text"
      # Optional: set ANTHROPIC_API_KEY if you replace the claude CLI
      # with the Anthropic API. The current implementation uses the
      # claude CLI binary — see README for how to mount it.
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      # Persist knowledge base and meeting data between restarts
      - knowledge_data:/app/.knowledge
      - meetings_data:/app/.meetings
      # Mount Claude CLI config for non-root user (appuser UID=1000)
      - ${HOME}/.claude.json:/home/appuser/.claude.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend Next.js app ──────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # The browser connects to this URL directly — must be reachable
        # from the user's machine, not just within Docker.
        NEXT_PUBLIC_WS_URL: wss://meeting-coach-api.nickai.cc/ws
        # API URL for server-side rewrites (internal Docker network)
        NEXT_PUBLIC_API_URL: http://server:3001
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  knowledge_data:
  meetings_data:
